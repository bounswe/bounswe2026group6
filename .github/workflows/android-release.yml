name: Android Release APK

on:
  workflow_dispatch:

concurrency:
  group: android-release-manual
  cancel-in-progress: true

jobs:
  build-release-apk:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/neph-release-key.jks"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/neph-release-key.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          NEPH_RELEASE_API_BASE_URL: https://api.neph.app
        run: ./gradlew clean assembleRelease

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: neph-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 14