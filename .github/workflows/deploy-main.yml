name: Deploy Main To EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'web/**'
      - '.github/workflows/deploy-main.yml'

concurrency:
  group: deploy-main-ec2
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Backend + Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            cd "${{ secrets.SERVER_PATH }}"

            git fetch origin main
            git checkout main
            git reset --hard origin/main
            git clean -fd -e backend/.env -e web/.env.production -e web/.env.local

            cd backend
            if [ -f package-lock.json ]; then
              npm ci --omit=dev --no-audit --no-fund || npm install --omit=dev --no-audit --no-fund
            else
              npm install --omit=dev --no-audit --no-fund
            fi

            pm2 restart neph-backend || pm2 start src/server.js --name neph-backend

            cd ../web
            if [ -f package-lock.json ]; then
              npm ci --no-audit --no-fund || npm install --no-audit --no-fund
            else
              npm install --no-audit --no-fund
            fi

            npm run build
            pm2 delete neph-web || true
            pm2 start npm --name neph-web --cwd "${{ secrets.SERVER_PATH }}/web" -- start -- -p 3001

            pm2 save

            curl -fsS http://127.0.0.1:3000/health >/dev/null
            for i in $(seq 1 30); do
              if curl -fsSI http://127.0.0.1:3001 >/dev/null; then
                break
              fi
              sleep 2
            done

            if ! curl -fsSI http://127.0.0.1:3001 >/dev/null; then
              pm2 logs neph-web --lines 120 --nostream || true
              exit 1
            fi
