services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neph_db}
      POSTGRES_USER: ${POSTGRES_USER:-neph_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neph_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-neph_user} -d ${POSTGRES_DB:-neph_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["sh", "-c", "npm run start:with-migrations"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${BACKEND_NODE_ENV:-production}
      APP_PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-neph_db}
      POSTGRES_USER: ${POSTGRES_USER:-neph_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neph_pass}
      DB_SSL: ${DB_SSL:-false}
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-your_gmail@gmail.com}
      SMTP_PASS: ${SMTP_PASS:-your_gmail_app_password}
      APP_URL: ${APP_URL:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
    volumes:
      - ./backend/migrations:/app/migrations:ro
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:3000/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:3000/api}
    ports:
      - "3001:3000"

volumes:
  postgres_data:
