<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Country Info</title>
</head>

<body>

<h1>Country Information</h1>
<p id="result">Loading...</p>

<script>
fetch("https://restcountries.com/v3.1/name/turkey")
.then(response => response.json())
.then(data => {

const country = data[0];

document.getElementById("result").innerHTML =
"Country: " + country.name.common +
"<br>Capital: " + country.capital[0] +
"<br>Population: " + country.population +
"<br><br>This data is retrieved from the REST Countries public API. The API provides information about countries such as the country name, capital city, and population.";

});
</script>

<a href="index.html">Back</a>

</body>
</html>
