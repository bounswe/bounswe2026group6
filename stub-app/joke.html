<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Joke</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      padding: 24px;
      color: #422006;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: #fffdf5;
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(120, 53, 15, 0.16);
      padding: 40px 32px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #92400e;
      margin-bottom: 28px;
    }

    .joke-box {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 16px;
      padding: 24px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
    }

    .joke-category {
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #b45309;
    }

    .joke-line {
      font-size: 1.125rem;
      line-height: 1.7;
    }

    .status {
      color: #92400e;
      text-align: center;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .button,
    .link-button {
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: transform 150ms ease, box-shadow 150ms ease,
        background-color 150ms ease;
    }

    .button {
      background: #d97706;
      color: #ffffff;
      box-shadow: 0 10px 18px rgba(217, 119, 6, 0.24);
    }

    .button:hover,
    .link-button:hover {
      transform: translateY(-1px);
    }

    .link-button {
      background: #ffffff;
      color: #92400e;
      border: 1px solid #fcd34d;
    }

    @media (max-width: 640px) {
      .card {
        padding: 32px 20px;
      }

      h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Random Joke</h1>
    <p class="subtitle">Button 7 opens this page and loads a fresh joke from a public API.</p>

    <section class="joke-box" aria-live="polite">
      <p id="joke-category" class="joke-category">Loading</p>
      <p id="joke-setup" class="joke-line status">Fetching a joke...</p>
      <p id="joke-delivery" class="joke-line"></p>
    </section>

    <div class="actions">
      <button id="refresh-joke" class="button" type="button">Get Another Joke</button>
      <a class="link-button" href="index.html">Back to Home</a>
    </div>
  </main>

  <script src="joke.js"></script>
</body>
</html>
